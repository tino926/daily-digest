<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 每日追蹤 - 2026-05-14</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px;
    line-height: 1.7;
    color: #24292e;
    background: #fafbfc;
}
h1 {
    font-size: 1.8em;
    border-bottom: 2px solid #e1e4e8;
    padding-bottom: 12px;
    margin-bottom: 24px;
}
.section {
    margin-bottom: 16px;
    background: #fff;
    border: 1px solid #e1e4e8;
    border-radius: 6px;
    overflow: hidden;
}
.section-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: #f6f8fa;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
}
.section-header:hover { background: #eef1f4; }
.section-title {
    flex: 1;
    font-size: 1.1em;
    font-weight: 600;
    color: #0366d6;
}
.section-toggle {
    font-size: 0.8em;
    color: #6a737d;
    transition: transform 0.2s;
}
.section.collapsed .section-toggle { transform: rotate(0deg); }
.section-body { /* 預設展開 */ }
.section.collapsed .section-body { display: none; }
.item {
    padding: 12px 16px;
    border-top: 1px solid #eef1f4;
}
.item-header {
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 8px;
}
.item-title {
    font-weight: 600;
    font-size: 1em;
    color: #24292e;
}
.item-summary-text {
    font-size: 0.9em;
    color: #586069;
    margin-top: 4px;
    display: block;
    line-height: 1.5;
}
.item-toggle {
    font-size: 0.7em;
    color: #6a737d;
    margin-top: 4px;
    transition: transform 0.2s;
    flex-shrink: 0;
}
.item.expanded .item-toggle { transform: rotate(90deg); }
.item-detail {
    display: none;
    padding: 8px 0 0 16px;
    font-size: 0.9em;
    color: #586069;
    line-height: 1.6;
    border-left: 2px solid #e1e4e8;
    margin-top: 8px;
}
.item.expanded .item-detail { display: block; }
.item-detail a {
    color: #0366d6;
    text-decoration: none;
}
.item-detail a:hover { text-decoration: underline; }
footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid #e1e4e8;
    text-align: center;
    color: #6a737d;
    font-size: 0.85em;
}
</style>
</head>
<body>
<h1>AI 每日追蹤 - 2026-05-14</h1>

<footer>由 Hermes Agent 產生</footer>
<script>
function toggleSection(id) {
    var el = document.getElementById(id);
    el.classList.toggle('collapsed');
}
function toggleItem(id) {
    var el = document.getElementById(id);
    el.classList.toggle('expanded');
}
</script>
</body>
</html>
